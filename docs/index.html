<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GasGuard IoT Monitor</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e17; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const THRESHOLDS = { safe: 300, warning: 600, danger: 800, critical: 950 };

    const getGasStatus = (ppm) => {
      if (ppm < THRESHOLDS.safe)    return { label: "SAFE",     color: "#22c55e", bg: "rgba(34,197,94,0.1)"  };
      if (ppm < THRESHOLDS.warning) return { label: "ELEVATED", color: "#eab308", bg: "rgba(234,179,8,0.1)"  };
      if (ppm < THRESHOLDS.danger)  return { label: "WARNING",  color: "#f97316", bg: "rgba(249,115,22,0.1)" };
      return                               { label: "DANGER",   color: "#ef4444", bg: "rgba(239,68,68,0.15)" };
    };

    const fmt = (d) => d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true });
    const fmtDate = (d) => d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });

    // ── Gauge ────────────────────────────────────────────────
    function GaugeArc({ ppm, max = 1000 }) {
      const pct = Math.min(ppm / max, 1);
      const st = getGasStatus(ppm);
      const startAngle = -225, sweep = 270;
      const r = 88, cx = 120, cy = 120;
      const p2c = (a) => ({ x: cx + r * Math.cos(a * Math.PI / 180), y: cy + r * Math.sin(a * Math.PI / 180) });
      const arc = (f, t) => { const s = p2c(f), e = p2c(t); return `M ${s.x} ${s.y} A ${r} ${r} 0 ${Math.abs(t-f)>180?1:0} 1 ${e.x} ${e.y}`; };
      const ticks = [0,200,400,600,800,1000];
      return (
        <svg viewBox="0 0 240 200" style={{ width:"100%", maxWidth:320 }}>
          <path d={arc(startAngle, startAngle+sweep)}       fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="14" strokeLinecap="round"/>
          <path d={arc(startAngle, startAngle+sweep*0.3)}   fill="none" stroke="rgba(34,197,94,0.25)"   strokeWidth="14" strokeLinecap="round"/>
          <path d={arc(startAngle+sweep*0.3,startAngle+sweep*0.6)} fill="none" stroke="rgba(234,179,8,0.25)"  strokeWidth="14" strokeLinecap="round"/>
          <path d={arc(startAngle+sweep*0.6,startAngle+sweep*0.8)} fill="none" stroke="rgba(249,115,22,0.25)" strokeWidth="14" strokeLinecap="round"/>
          <path d={arc(startAngle+sweep*0.8,startAngle+sweep)}     fill="none" stroke="rgba(239,68,68,0.25)"  strokeWidth="14" strokeLinecap="round"/>
          {pct>0.005 && <path d={arc(startAngle, startAngle+sweep*pct)} fill="none" stroke={st.color} strokeWidth="14" strokeLinecap="round" style={{filter:`drop-shadow(0 0 8px ${st.color}80)`,transition:"all 0.5s ease"}}/>}
          {ticks.map(v => {
            const a = startAngle + sweep*(v/max);
            const inn = {x:cx+(r-16)*Math.cos(a*Math.PI/180), y:cy+(r-16)*Math.sin(a*Math.PI/180)};
            const out = {x:cx+(r+4) *Math.cos(a*Math.PI/180), y:cy+(r+4) *Math.sin(a*Math.PI/180)};
            const lbl = {x:cx+(r-28)*Math.cos(a*Math.PI/180), y:cy+(r-28)*Math.sin(a*Math.PI/180)};
            return <g key={v}><line x1={inn.x} y1={inn.y} x2={out.x} y2={out.y} stroke="rgba(255,255,255,0.3)" strokeWidth="1.5"/><text x={lbl.x} y={lbl.y} textAnchor="middle" dominantBaseline="middle" fill="rgba(255,255,255,0.4)" fontSize="9" fontFamily="monospace">{v}</text></g>;
          })}
          <text x={cx} y={cy-8}  textAnchor="middle" fill={st.color} fontSize="38" fontWeight="800" fontFamily="monospace" style={{transition:"fill 0.3s"}}>{Math.round(ppm)}</text>
          <text x={cx} y={cy+14} textAnchor="middle" fill="rgba(255,255,255,0.45)" fontSize="11" fontFamily="monospace">PPM</text>
          <text x={cx} y={cy+34} textAnchor="middle" fill={st.color} fontSize="13" fontWeight="700" letterSpacing="2" fontFamily="monospace">{st.label}</text>
        </svg>
      );
    }

    // ── Sparkline ────────────────────────────────────────────
    function Sparkline({ data, width=260, height=50 }) {
      if (data.length < 2) return null;
      const max = Math.max(...data,400), min = Math.min(...data,0), rng = max-min||1;
      const pts = data.map((v,i) => `${(i/(data.length-1))*width},${height-((v-min)/rng)*(height-4)}`).join(" ");
      const st = getGasStatus(data[data.length-1]);
      return (
        <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height}}>
          <defs><linearGradient id="sf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={st.color} stopOpacity="0.3"/><stop offset="100%" stopColor={st.color} stopOpacity="0"/></linearGradient></defs>
          <polyline points={pts} fill="none" stroke={st.color} strokeWidth="1.5" opacity="0.8"/>
          <polyline points={`0,${height} ${pts} ${width},${height}`} fill="url(#sf)" stroke="none"/>
        </svg>
      );
    }

    // ── Main Dashboard ───────────────────────────────────────
    function GasMonitorDashboard() {
      const RELAY_URL = "https://gas-leak-detector-1znc.onrender.com";
      const savedUrl  = localStorage.getItem("gasDetectorURL") || RELAY_URL;
      const [serverUrl,  setServerUrl]  = useState(savedUrl);
      const [urlInput,   setUrlInput]   = useState(savedUrl);
      const [liveMode,   setLiveMode]   = useState(true);
      const [gasPPM,     setGasPPM]     = useState(180);
      const [valveOpen,  setValveOpen]  = useState(true);
      const [valveBusy,  setValveBusy]  = useState(false);
      const [connected,  setConnected]  = useState(false);
      const [logs,       setLogs]       = useState([]);
      const [history,    setHistory]    = useState([180]);
      const [autoShutoff,setAutoShutoff]= useState(true);
      const [threshold,  setThreshold]  = useState(800);
      const [alerts,     setAlerts]     = useState([]);
      const [showLogs,   setShowLogs]   = useState(false);
      const [simMode,    setSimMode]    = useState("normal");
      const [temp,       setTemp]       = useState(28.5);
      const [humidity,   setHumidity]   = useState(62);
      const timerRef     = useRef(null);
      const alertFired   = useRef(false);

      const addLog = useCallback((type, msg, ppm) =>
        setLogs(p => [{ id: Date.now(), time: new Date(), type, message: msg, ppm }, ...p].slice(0,200)), []);

      const addAlert = useCallback((msg, sev) => {
        const id = Date.now();
        setAlerts(p => [{ id, message: msg, severity: sev, time: new Date() }, ...p].slice(0,20));
        setTimeout(() => setAlerts(p => p.filter(a => a.id !== id)), 8000);
      }, []);

      // ── Connect to relay / ESP32 ───────────────────────────
      const connect = () => {
        const url = urlInput.trim().replace(/\/$/, "");
        if (!url) return;
        localStorage.setItem("gasDetectorURL", url);
        setServerUrl(url);
        setLiveMode(true);
        addAlert("Connecting to " + url, "info");
      };

      // ── Live polling ───────────────────────────────────────
      useEffect(() => {
        if (!liveMode || !serverUrl) return;
        clearInterval(timerRef.current);
        timerRef.current = setInterval(async () => {
          try {
            const res  = await fetch(`${serverUrl}/api/sensor`, { signal: AbortSignal.timeout(3000) });
            const data = await res.json();
            setGasPPM(data.ppm ?? 0);
            if (data.temp     != null) setTemp(data.temp);
            if (data.humidity != null) setHumidity(data.humidity);
            setValveOpen(data.valve === "open");
            setValveBusy(data.valve === "moving");
            setConnected(true);
            setHistory(p => [...p.slice(-59), data.ppm ?? 0]);
          } catch { setConnected(false); }
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [liveMode, serverUrl]);

      // ── Demo simulation ────────────────────────────────────
      useEffect(() => {
        if (liveMode) return;
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setGasPPM(prev => {
            const noise = (Math.random()-0.5)*30;
            let next;
            if      (simMode==="leak")  next = Math.min(prev + Math.random()*15+3, 980);
            else if (simMode==="spike") { next = prev>850 ? prev-Math.random()*40 : prev+Math.random()*80; if (prev>900) setSimMode("normal"); }
            else { const t = valveOpen ? 160+Math.sin(Date.now()/10000)*40 : Math.max(prev-8,50); next = prev+(t-prev)*0.08+noise; }
            return Math.max(50, Math.min(next, 999));
          });
          setTemp(p => p+(Math.random()-0.5)*0.3);
          setHumidity(p => Math.max(40, Math.min(85, p+(Math.random()-0.5)*0.5)));
        }, 800);
        return () => clearInterval(timerRef.current);
      }, [liveMode, simMode, valveOpen]);

      // ── Threshold check (demo) ─────────────────────────────
      useEffect(() => {
        if (liveMode) return;
        setHistory(p => [...p.slice(-59), gasPPM]);
        if (gasPPM >= THRESHOLDS.danger && !alertFired.current) {
          addAlert(`Gas critical: ${Math.round(gasPPM)} PPM`, "danger");
          addLog("danger", `Gas reached ${Math.round(gasPPM)} PPM`, gasPPM);
          alertFired.current = true;
          if (autoShutoff && valveOpen && gasPPM >= threshold) {
            setValveOpen(false);
            addLog("shutoff", `AUTO SHUT-OFF at ${Math.round(gasPPM)} PPM`, gasPPM);
            addAlert("AUTO SHUT-OFF ACTIVATED", "critical");
            setSimMode("normal");
          }
        }
        if (gasPPM < THRESHOLDS.warning) alertFired.current = false;
      }, [gasPPM, liveMode]);

      useEffect(() => {
        const t = setInterval(() => addLog("info", `Reading: ${Math.round(gasPPM)} PPM`, gasPPM), 15000);
        return () => clearInterval(t);
      }, [gasPPM]);

      // ── Valve toggle ───────────────────────────────────────
      const toggleValve = async () => {
        if (valveBusy) return;
        if (liveMode && serverUrl) {
          const ep = valveOpen ? "close" : "open";
          setValveBusy(true);
          try {
            const res  = await fetch(`${serverUrl}/api/valve/${ep}`, { method:"POST", signal: AbortSignal.timeout(6000) });
            const data = await res.json();
            if (data.success) {
              setValveBusy(data.valve === "moving");
              addLog(ep==="open"?"open":"shutoff", `Valve ${ep.toUpperCase()} command sent`, gasPPM);
              addAlert(`Valve ${ep.toUpperCase()} command sent`, ep==="open"?"info":"warning");
            } else {
              setValveBusy(false);
              addAlert("Command denied: " + (data.reason||"unknown"), "danger");
            }
          } catch { setConnected(false); setValveBusy(false); addAlert("Failed to reach server", "danger"); }
          return;
        }
        const next = !valveOpen;
        setValveOpen(next);
        addLog(next?"open":"shutoff", `Valve ${next?"OPENED":"CLOSED"} (demo)`, gasPPM);
        addAlert(`Valve ${next?"OPENED":"CLOSED"} (demo)`, next?"info":"warning");
        if (!next) setSimMode("normal");
      };

      const st = getGasStatus(gasPPM);
      const danger = gasPPM >= THRESHOLDS.danger;
      const card = { background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:16, padding:"20px 24px", backdropFilter:"blur(20px)" };
      const logColors = { info:"#64748b", warning:"#eab308", danger:"#ef4444", shutoff:"#ef4444", open:"#22c55e" };

      return (
        <div style={{ minHeight:"100vh", background:"#0a0e17", backgroundImage:"radial-gradient(ellipse at 20% 50%, rgba(16,185,129,0.04) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.04) 0%, transparent 50%)", color:"#e2e8f0", fontFamily:"'Segoe UI', system-ui, sans-serif", padding:"16px", position:"relative", overflow:"hidden" }}>
          <div style={{ position:"fixed", inset:0, background:"repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px)", pointerEvents:"none", zIndex:1 }}/>

          {/* Alerts */}
          <div style={{ position:"fixed", top:16, right:16, zIndex:100, display:"flex", flexDirection:"column", gap:8, maxWidth:360 }}>
            {alerts.map(a => (
              <div key={a.id} style={{ background: a.severity==="critical"?"rgba(239,68,68,0.95)":a.severity==="danger"?"rgba(239,68,68,0.85)":a.severity==="warning"?"rgba(234,179,8,0.85)":"rgba(34,197,94,0.85)", color:"#fff", padding:"12px 18px", borderRadius:12, fontSize:13, fontWeight:600, boxShadow:"0 8px 32px rgba(0,0,0,0.4)", animation:"slideIn 0.3s ease" }}>
                {a.severity==="critical" && "🚨 "}{a.message}
                <div style={{ fontSize:10, opacity:0.8, marginTop:2 }}>{fmt(a.time)}</div>
              </div>
            ))}
          </div>

          <div style={{ maxWidth:900, margin:"0 auto", position:"relative", zIndex:2 }}>
            {/* Header */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16, flexWrap:"wrap", gap:12 }}>
              <div>
                <h1 style={{ margin:0, fontSize:22, fontWeight:800, display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:26 }}>⚙️</span>
                  <span style={{ background:"linear-gradient(135deg, #22c55e, #3b82f6)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>GasGuard</span>
                  <span style={{ fontSize:13, fontWeight:400, color:"#64748b", marginLeft:4 }}>IoT Monitor</span>
                </h1>
                <p style={{ margin:"4px 0 0", fontSize:11, color:"#475569", fontFamily:"monospace" }}>ESP32 · MQ-6 Sensor · v2.0</p>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 12px", borderRadius:20, background: liveMode?"rgba(34,197,94,0.1)":"rgba(234,179,8,0.1)", border:`1px solid ${liveMode?"rgba(34,197,94,0.3)":"rgba(234,179,8,0.3)"}` }}>
                  <div style={{ width:7, height:7, borderRadius:"50%", background: liveMode?(connected?"#22c55e":"#ef4444"):"#eab308", boxShadow:`0 0 6px ${liveMode?(connected?"#22c55e":"#ef4444"):"#eab308"}` }}/>
                  <span style={{ fontSize:11, fontWeight:700, color: liveMode?(connected?"#22c55e":"#ef4444"):"#eab308" }}>{liveMode?(connected?"LIVE":"OFFLINE"):"DEMO"}</span>
                </div>
                <div style={{ fontSize:11, color:"#475569", fontFamily:"monospace" }}>{fmtDate(new Date())} · {fmt(new Date())}</div>
              </div>
            </div>

            {/* Server URL bar */}
            <div style={{ ...card, marginBottom:16, background:"rgba(59,130,246,0.04)", border:`1px solid ${liveMode?"rgba(34,197,94,0.2)":"rgba(59,130,246,0.15)"}` }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <span style={{ fontSize:11, fontWeight:700, color:"#3b82f6", letterSpacing:1, whiteSpace:"nowrap" }}>SERVER URL</span>
                <input
                  value={urlInput}
                  onChange={e => setUrlInput(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && connect()}
                  placeholder="https://your-relay.onrender.com"
                  style={{ flex:1, minWidth:260, padding:"7px 12px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.05)", color:"#e2e8f0", fontFamily:"monospace", fontSize:12, outline:"none" }}
                />
                <button onClick={connect} style={{ padding:"7px 16px", borderRadius:8, border:"none", cursor:"pointer", fontSize:12, fontWeight:700, background:"linear-gradient(135deg, #22c55e, #16a34a)", color:"#fff", whiteSpace:"nowrap" }}>
                  Connect Live
                </button>
                <button onClick={() => { setLiveMode(false); setConnected(false); }} style={{ padding:"7px 16px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", cursor:"pointer", fontSize:12, fontWeight:700, background:"rgba(255,255,255,0.05)", color:"#94a3b8" }}>
                  Demo Mode
                </button>
              </div>
              {liveMode && !connected && (
                <div style={{ marginTop:10, fontSize:11, color:"#f97316", fontFamily:"monospace" }}>
                  ⚠ Cannot reach server. Check the relay URL or wait ~30 s for Render.com to wake up.
                </div>
              )}
            </div>

            {/* Grid */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>

              {/* Gauge card */}
              <div style={{ ...card, gridColumn:"1/2", textAlign:"center", border: danger?"1px solid rgba(239,68,68,0.3)":card.border, animation: danger?"dangerPulse 1.5s ease infinite":"none" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#64748b", letterSpacing:2, marginBottom:8 }}>GAS CONCENTRATION</div>
                <GaugeArc ppm={gasPPM}/>
                <div style={{ marginTop:8 }}>
                  <Sparkline data={history}/>
                  <div style={{ fontSize:10, color:"#475569", marginTop:4 }}>Last 60 readings</div>
                </div>
              </div>

              {/* Right column */}
              <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

                {/* Valve */}
                <div style={{ ...card, border: !valveOpen?"1px solid rgba(239,68,68,0.3)":"1px solid rgba(34,197,94,0.15)" }}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#64748b", letterSpacing:2, marginBottom:14 }}>VALVE CONTROL</div>
                  <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                    <div style={{ width:56, height:56, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", background: valveBusy?"rgba(234,179,8,0.15)":valveOpen?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.15)", border:`2px solid ${valveBusy?"#eab308":valveOpen?"#22c55e":"#ef4444"}`, boxShadow:`0 0 20px ${valveBusy?"rgba(234,179,8,0.2)":valveOpen?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)"}`, transition:"all 0.4s ease" }}>
                      <span style={{ fontSize:24 }}>{valveBusy?"🔄":valveOpen?"🟢":"🔴"}</span>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:18, fontWeight:800, color: valveBusy?"#eab308":valveOpen?"#22c55e":"#ef4444" }}>
                        {valveBusy?"MOVING...":valveOpen?"VALVE OPEN":"VALVE CLOSED"}
                      </div>
                      <div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>
                        {liveMode?"Via relay → ESP32":"Demo mode"}
                      </div>
                    </div>
                  </div>
                  <button onClick={toggleValve} disabled={valveBusy} style={{ width:"100%", marginTop:16, padding:"14px", borderRadius:12, border:"none", cursor: valveBusy?"not-allowed":"pointer", fontSize:14, fontWeight:800, letterSpacing:1, color:"#fff", background: valveBusy?"linear-gradient(135deg,#475569,#334155)":valveOpen?"linear-gradient(135deg,#dc2626,#b91c1c)":"linear-gradient(135deg,#16a34a,#15803d)", boxShadow: valveBusy?"none":valveOpen?"0 4px 20px rgba(220,38,38,0.3)":"0 4px 20px rgba(22,163,74,0.3)", opacity: valveBusy?0.7:1, transition:"all 0.3s ease" }}>
                    {valveBusy?"⏳  MOTOR MOVING...":valveOpen?"🛑  EMERGENCY SHUT-OFF":"✅  OPEN VALVE"}
                  </button>
                </div>

                {/* Env */}
                <div style={card}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#64748b", letterSpacing:2, marginBottom:12 }}>ENVIRONMENT</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                    <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:12, padding:"12px 16px", textAlign:"center" }}>
                      <div style={{ fontSize:10, color:"#64748b", marginBottom:4 }}>TEMPERATURE</div>
                      <div style={{ fontSize:22, fontWeight:800, fontFamily:"monospace", color:"#f59e0b" }}>{temp.toFixed(1)}°C</div>
                    </div>
                    <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:12, padding:"12px 16px", textAlign:"center" }}>
                      <div style={{ fontSize:10, color:"#64748b", marginBottom:4 }}>HUMIDITY</div>
                      <div style={{ fontSize:22, fontWeight:800, fontFamily:"monospace", color:"#3b82f6" }}>{humidity.toFixed(0)}%</div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Settings */}
              <div style={{ ...card, gridColumn:"1/-1" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:16 }}>
                  {!liveMode ? (
                    <>
                      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                        <span style={{ fontSize:11, fontWeight:700, color:"#64748b", letterSpacing:2 }}>AUTO SHUT-OFF</span>
                        <button onClick={() => setAutoShutoff(p=>!p)} style={{ width:48, height:26, borderRadius:13, border:"none", cursor:"pointer", position:"relative", background: autoShutoff?"#22c55e":"#334155", transition:"background 0.3s" }}>
                          <div style={{ width:20, height:20, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left: autoShutoff?25:3, transition:"left 0.3s", boxShadow:"0 2px 4px rgba(0,0,0,0.3)" }}/>
                        </button>
                        <span style={{ fontSize:12, color: autoShutoff?"#22c55e":"#64748b" }}>{autoShutoff?"Enabled":"Disabled"}</span>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:11, color:"#64748b" }}>Threshold:</span>
                        {[600,700,800,900].map(v => (
                          <button key={v} onClick={() => setThreshold(v)} style={{ padding:"5px 12px", borderRadius:8, border: threshold===v?"1px solid rgba(59,130,246,0.4)":"1px solid transparent", cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"monospace", background: threshold===v?"rgba(59,130,246,0.25)":"rgba(255,255,255,0.05)", color: threshold===v?"#60a5fa":"#64748b" }}>{v}</button>
                        ))}
                        <span style={{ fontSize:11, color:"#64748b" }}>PPM</span>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:11, color:"#64748b" }}>Simulate:</span>
                        {[["normal","Normal"],["leak","Leak 🔥"],["spike","Spike ⚡"]].map(([m,l]) => (
                          <button key={m} onClick={() => { setSimMode(m); if (!valveOpen && m!=="normal") setValveOpen(true); }} style={{ padding:"5px 12px", borderRadius:8, border: simMode===m?"1px solid rgba(239,68,68,0.3)":"1px solid transparent", cursor:"pointer", fontSize:11, fontWeight:600, background: simMode===m?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.05)", color: simMode===m?"#f87171":"#64748b" }}>{l}</button>
                        ))}
                      </div>
                    </>
                  ) : (
                    <div style={{ fontSize:12, color:"#64748b" }}>
                      ✅ Auto shut-off is handled autonomously by the ESP32 at 800 PPM. Use the button above for manual remote override.
                    </div>
                  )}
                </div>
              </div>

              {/* Log */}
              <div style={{ ...card, gridColumn:"1/-1" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#64748b", letterSpacing:2 }}>DATA LOG <span style={{ color:"#475569", fontWeight:400 }}>({logs.length})</span></div>
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={() => setShowLogs(p=>!p)} style={{ padding:"5px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.05)", color:"#94a3b8", fontSize:11, cursor:"pointer", fontWeight:600 }}>{showLogs?"Collapse":"Expand"}</button>
                    <button onClick={() => setLogs([])} style={{ padding:"5px 14px", borderRadius:8, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.05)", color:"#94a3b8", fontSize:11, cursor:"pointer", fontWeight:600 }}>Clear</button>
                  </div>
                </div>
                <div style={{ maxHeight: showLogs?300:140, overflow:"auto", transition:"max-height 0.4s ease" }}>
                  {logs.length===0 ? (
                    <div style={{ textAlign:"center", padding:24, color:"#334155", fontSize:13 }}>No events logged yet</div>
                  ) : (
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                      <thead><tr style={{ borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                        {["TIME","TYPE","PPM","EVENT"].map(h => <th key={h} style={{ textAlign:"left", padding:"6px 8px", color:"#475569", fontWeight:600, fontSize:10, letterSpacing:1 }}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {logs.map(log => (
                          <tr key={log.id} style={{ borderBottom:"1px solid rgba(255,255,255,0.03)" }}>
                            <td style={{ padding:"6px 8px", fontFamily:"monospace", color:"#64748b", fontSize:11 }}>{fmt(log.time)}</td>
                            <td style={{ padding:"6px 8px" }}><span style={{ display:"inline-block", padding:"2px 8px", borderRadius:6, fontSize:10, fontWeight:700, background:`${logColors[log.type]}20`, color:logColors[log.type], letterSpacing:0.5, textTransform:"uppercase" }}>{log.type}</span></td>
                            <td style={{ padding:"6px 8px", fontFamily:"monospace", color:getGasStatus(log.ppm).color, fontWeight:600 }}>{Math.round(log.ppm)}</td>
                            <td style={{ padding:"6px 8px", color:"#94a3b8" }}>{log.message}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            </div>

            <div style={{ textAlign:"center", marginTop:24, fontSize:10, color:"#334155", fontFamily:"monospace" }}>
              BATCH 57 · REC Mechanical Engineering · Design Thinking &amp; Innovation · GE23627
            </div>
          </div>

          <style>{`
            @keyframes slideIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
            @keyframes dangerPulse { 0%,100% { box-shadow:0 0 0 0 rgba(239,68,68,0); } 50% { box-shadow:0 0 30px 4px rgba(239,68,68,0.15); } }
            ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#1e293b; border-radius:4px; }
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<GasMonitorDashboard />);
  </script>
</body>
</html>
